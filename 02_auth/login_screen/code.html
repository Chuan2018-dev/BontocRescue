        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background: rgba(244, 250, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .auth-gradient {
            background: linear-gradient(135deg, #af101a 0%, #d32f2f 100%);

<body class="bg-surface font-body text-on-surface flex min-h-screen items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Decoration (Asymmetric Aesthetic) -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
<div class="absolute -top-[10%] -right-[5%] w-[40%] h-[40%] rounded-full bg-surface-container-high/40 blur-[120px]"></div>
<div class="absolute bottom-[5%] -left-[10%] w-[50%] h-[50%] rounded-full bg-surface-container/30 blur-[100px]"></div>
</div>
<main class="w-full max-w-[420px] flex flex-col gap-10">
<!-- Identity Section -->
<header class="flex flex-col items-start gap-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg auth-gradient flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline font-black uppercase tracking-widest text-lg text-primary">Vigilant Sentinel</h1>
</div>
<div class="space-y-1">
<h2 class="text-3xl font-bold tracking-tight text-on-surface">Secure Access</h2>
<p class="text-on-surface-variant text-sm font-medium">Authentication required for Sentinel Operator ID.</p>
</div>
</header>
<!-- Auth Form -->
<div class="surface-container-lowest glass-panel rounded-xl p-8 shadow-[0_4px_40px_0_rgba(13,30,37,0.06)]">
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- Email/Username Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-bold uppercase tracking-[0.05em] text-on-surface-variant" for="identity">Operator Identity</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline transition-colors group-focus-within:text-primary" data-icon="account_circle">account_circle</span>
<input class="w-full pl-8 pr-4 py-3 bg-transparent border-b-2 border-outline-variant/30 focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline transition-all font-medium" id="identity" name="identity" placeholder="Email or ID Number" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label text-xs font-bold uppercase tracking-[0.05em] text-on-surface-variant" for="password">Security Protocol</label>
<a class="text-xs font-bold text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">Forgot password</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline transition-colors group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full pl-8 pr-4 py-3 bg-transparent border-b-2 border-outline-variant/30 focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline transition-all font-medium" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input class="w-4 h-4 rounded-sm border-2 border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface bg-transparent" id="remember" type="checkbox"/>
</div>
<label class="text-sm font-medium text-on-surface-variant select-none" for="remember">Trusted terminal (30 days)</label>
</div>
<!-- Login Button -->
<button class="auth-gradient w-full py-4 px-6 rounded-md text-on-primary font-bold tracking-tight text-base shadow-xl shadow-primary/25 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- System Footer -->
<footer class="flex flex-col items-center gap-8">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-high rounded-sm">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">LoRa Active</span>
</div>
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-high rounded-sm">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container"></div>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Secure Uplink</span>
</div>
</div>
<p class="text-sm text-on-surface-variant font-medium">
                New operator? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">Create Account</a>
</p>
</footer>
</main>
<!-- Aesthetic Corner Map Element (Subtle context) -->
<div class="fixed bottom-10 right-10 w-48 h-48 hidden lg:block overflow-hidden rounded-xl grayscale opacity-20 pointer-events-none">

<div class="absolute inset-0 border-2 border-outline-variant/20 rounded-xl"></div>
</div>
</body></html>
