experiment:
  name: bontoc_southern_leyte_recommended_photo_relevance_mobilenet
  municipality: Bontoc
  province: Southern Leyte
  country: Philippines
  labels:
    - related
    - unrelated
  source_domains:
    - road_accident
    - general_accident
    - emergency_scene
    - ui_reference
    - public_non_incident_reference

dataset:
  root: datasets/bontoc_southern_leyte
  manifests:
    train: metadata/train_photo_relevance.csv
    val: metadata/val_photo_relevance.csv
    test: metadata/test_photo_relevance.csv
  image_size: 224

training:
  architecture: mobilenet_v3_small
  pretrained: true
  batch_size: 8
  epochs: 10
  learning_rate: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  seed: 42

inference:
  low_confidence_threshold: 0.75
  responder_review_action: needs_responder_review
  reject_label: unrelated
  reject_threshold: 0.70

outputs:
  checkpoints_dir: artifacts/checkpoints
  reports_dir: artifacts/reports
  best_checkpoint_name: bontoc_photo_relevance_recommended_mobilenet_best.pt
  metrics_report_name: bontoc_photo_relevance_recommended_mobilenet_metrics.json
