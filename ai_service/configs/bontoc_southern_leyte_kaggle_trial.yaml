experiment:
  name: bontoc_southern_leyte_kaggle_trial_300
  municipality: Bontoc
  province: Southern Leyte
  country: Philippines
  labels:
    - minor
    - serious
    - fatal
  source_domains:
    - road_accident
    - general_accident
    - emergency_scene

dataset:
  root: datasets/bontoc_southern_leyte
  manifests:
    train: metadata/train_external_trial_accident_severity_image_dataset_v4.csv
    val: metadata/val_external_trial_accident_severity_image_dataset_v4.csv
    test: metadata/test_external_trial_accident_severity_image_dataset_v4.csv
  image_size: 224

training:
  architecture: resnet18
  pretrained: true
  batch_size: 8
  epochs: 12
  learning_rate: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  seed: 42

inference:
  low_confidence_threshold: 0.65
  responder_review_action: needs_responder_review

outputs:
  checkpoints_dir: artifacts/checkpoints
  reports_dir: artifacts/reports
  best_checkpoint_name: bontoc_severity_kaggle_trial_best.pt
  metrics_report_name: bontoc_severity_kaggle_trial_metrics.json
