experiment:
  name: bontoc_southern_leyte_v0_3_candidate
  municipality: Bontoc
  province: Southern Leyte
  country: Philippines
  labels:
    - minor
    - serious
    - fatal
  source_domains:
    - road_accident
    - general_accident
    - emergency_scene

dataset:
  root: datasets/bontoc_southern_leyte
  manifests:
    train: v0_3_candidate/manifests/train_v0_3_candidate_template.csv
    val: v0_3_candidate/manifests/val_v0_3_candidate_template.csv
    test: v0_3_candidate/manifests/test_v0_3_candidate_template.csv
  image_size: 224

training:
  architecture: resnet18
  pretrained: true
  batch_size: 8
  epochs: 14
  learning_rate: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  seed: 42

inference:
  low_confidence_threshold: 0.65
  responder_review_action: needs_responder_review

outputs:
  checkpoints_dir: artifacts/checkpoints
  reports_dir: artifacts/reports
  best_checkpoint_name: bontoc_severity_v0_3_candidate_best.pt
  metrics_report_name: bontoc_severity_v0_3_candidate_metrics.json
